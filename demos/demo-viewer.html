<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo – Viewer & Export</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--s1:#0f0f18;--s2:#15151f;--s3:#1c1c28;
  --b:rgba(255,255,255,.07);--bhi:rgba(255,255,255,.12);
  --g:#22c55e;--gd:rgba(34,197,94,.1);--gb:rgba(34,197,94,.2);
  --amber:#f59e0b;--ambd:rgba(245,158,11,.1);--ambb:rgba(245,158,11,.2);
  --blue:#60a5fa;--bld:rgba(96,165,250,.1);
  --red:#f87171;--redd:rgba(248,113,113,.1);
  --t:#d8d8ea;--m:#52526a;--mhi:#7070a0;
  --mono:'JetBrains Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --display:'Syne',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--sans)}

.topbar{display:flex;align-items:center;gap:16px;padding:12px 24px;background:var(--s1);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:50}
.tb-logo{display:flex;align-items:center;gap:10px}
.tb-ic{width:32px;height:32px;background:var(--gd);border:1px solid var(--gb);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tb-name{font-family:var(--display);font-size:16px;font-weight:800;color:#fff}
.tb-name em{color:var(--g);font-style:normal}
.tb-sep{width:1px;height:24px;background:var(--b)}

.stat-chip{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:5px 12px}
.sc-val{font-family:var(--mono);font-size:14px;font-weight:600;color:#fff}
.sc-lbl{font-size:11px;color:var(--m)}
.stat-chip.green{background:var(--gd);border-color:var(--gb)}.stat-chip.green .sc-val{color:var(--g)}
.stat-chip.amber{background:var(--ambd);border-color:var(--ambb)}.stat-chip.amber .sc-val{color:var(--amber)}
.stat-chip.blue{background:var(--bld);border-color:rgba(96,165,250,.2)}.stat-chip.blue .sc-val{color:var(--blue)}

.actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid;font-family:var(--sans);transition:all .15s;white-space:nowrap}
.btn-dl{background:var(--g);color:#000;border-color:var(--g)}
.btn-sheets{background:rgba(52,168,83,.12);color:#34a853;border-color:rgba(52,168,83,.3)}
.btn-copy{background:var(--s2);color:var(--mhi);border-color:var(--b)}

.content{padding:20px 24px}

.query-bar{display:flex;align-items:center;gap:12px;background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:12px 18px;margin-bottom:18px}
.qb-icon{font-size:18px;flex-shrink:0}
.qb-query{font-family:var(--mono);font-size:14px;color:#fff;flex:1}
.qb-time{font-size:11px;color:var(--m);white-space:nowrap}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:6px 12px;flex:1;min-width:200px}
.search-box input{background:transparent;border:none;outline:none;color:var(--t);font-size:13px;width:100%;font-family:var(--sans)}
.search-box input::placeholder{color:var(--m)}
.filter-btn{padding:6px 12px;background:var(--s2);border:1px solid var(--b);border-radius:7px;font-size:12px;color:var(--m);cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap}
.filter-btn.active{background:var(--gd);color:var(--g);border-color:var(--gb)}

.table-wrap{background:var(--s1);border:1px solid var(--b);border-radius:12px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--s2);padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--m);border-bottom:1px solid var(--b);white-space:nowrap;position:sticky;top:0;z-index:2}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr.highlight{background:rgba(34,197,94,.05)}
tbody td{padding:11px 14px;vertical-align:middle;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.cell-name{color:#e8e8f8;font-weight:600}
.cell-rating{font-family:var(--mono);font-weight:700}
.star{color:var(--amber);font-size:13px}
.cell-email a{color:var(--g);font-family:var(--mono);font-size:11.5px;text-decoration:none}
.cell-email .no{color:var(--m)}
.cell-web a{color:var(--blue);font-size:12px;text-decoration:none}
.cell-web .no{color:var(--m)}
.cell-phone{font-family:var(--mono);font-size:12px;color:var(--t)}
.cell-social{font-size:11.5px}
.cell-social a{color:var(--blue);text-decoration:none;margin-right:6px}
.cell-social .no{color:var(--m)}
.cell-addr{font-size:12px;color:var(--m);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.footer{padding:14px 24px;border-top:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--m);margin-top:20px}

/* row fade-in */
tbody tr{opacity:0;animation:fadeRow .4s ease forwards}
@keyframes fadeRow{to{opacity:1}}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gd);border:1px solid var(--gb);color:var(--g);padding:9px 20px;border-radius:20px;font-size:12.5px;font-family:var(--mono);white-space:nowrap;z-index:300;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* Search box typing cursor */
.cursor-blink{display:inline-block;width:1px;height:13px;background:var(--g);vertical-align:middle;margin-left:1px;animation:blink .5s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* filter click highlight */
.filter-btn.flash{animation:flashBtn .4s ease}
@keyframes flashBtn{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

/* ═══ COMPREHENSIVE RESPONSIVE ═══ */
@media(max-width:900px){
  .topbar{flex-wrap:wrap;height:auto;padding:10px 16px;gap:10px}
  .stat-chip{padding:4px 10px}
  .sc-val{font-size:12px}
  .actions{margin-left:0;width:100%;justify-content:flex-start}
}
@media(max-width:600px){
  .topbar{padding:10px 12px;gap:8px}
  .tb-name{font-size:14px}
  .tb-sep{display:none}
  .stat-chip{padding:3px 8px;border-radius:6px}
  .sc-val{font-size:11px}
  .sc-lbl{font-size:10px}
  .actions{flex-wrap:wrap;gap:6px}
  .btn{padding:6px 12px;font-size:12px;border-radius:6px}
  .content{padding:12px}
  .query-bar{padding:10px 14px;border-radius:8px;gap:8px;flex-wrap:wrap}
  .qb-query{font-size:12px}
  .qb-time{font-size:10px}
  .toolbar{gap:6px}
  .search-box{min-width:160px;padding:5px 10px}
  .search-box input{font-size:12px}
  .filter-btn{padding:5px 10px;font-size:11px}
  .table-wrap{border-radius:8px}
  thead th{padding:8px 10px;font-size:9px}
  tbody td{padding:8px 10px;font-size:12px;max-width:140px}
  .footer{padding:10px 12px;font-size:10px}
  .toast{font-size:11px;padding:7px 16px}
}
@media(max-width:480px){
  .content{padding:10px}
  .topbar{padding:8px 10px}
  .tb-name{font-size:13px}
  .stat-chip{font-size:10px}
  .btn{padding:5px 10px;font-size:11px}
  .query-bar{padding:8px 10px}
  .qb-icon{font-size:14px}
  .qb-query{font-size:11px}
  thead th{padding:6px 8px;font-size:8px}
  tbody td{padding:6px 8px;font-size:11px;max-width:110px}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-box{min-width:0;width:100%}
}
@media(max-width:360px){
  .topbar{padding:6px 8px}
  .tb-logo{gap:6px}
  .tb-ic{width:28px;height:28px}
  .tb-name{font-size:12px}
  .content{padding:8px}
  .actions{gap:4px}
  .btn{padding:4px 8px;font-size:10px}
  thead th{font-size:7px;padding:5px 6px}
  tbody td{font-size:10px;padding:5px 6px;max-width:90px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">
    <div class="tb-ic">📍</div>
    <div class="tb-name">Maps Lead <em>Scraper</em></div>
  </div>
  <div class="tb-sep"></div>
  <div class="stat-chip green"><span class="sc-val" id="totalStat">20</span><span class="sc-lbl">Total</span></div>
  <div class="stat-chip amber"><span class="sc-val">4.5</span><span class="sc-lbl">Avg Rating</span></div>
  <div class="stat-chip blue"><span class="sc-val" id="emailStat">17</span><span class="sc-lbl">With Email</span></div>
  <div class="actions">
    <button class="btn btn-dl" id="btnDl">⬇ Download CSV</button>
    <button class="btn btn-sheets">📊 Google Sheets</button>
    <button class="btn btn-copy" id="btnCopy">📋 Copy All</button>
  </div>
</div>

<div class="content">
  <div class="query-bar">
    <div class="qb-icon">🔍</div>
    <div class="qb-query">"restaurants in Dubai"</div>
    <div class="qb-time">Scraped 12s ago</div>
  </div>

  <div class="toolbar">
    <div class="search-box">🔎 <input type="text" id="searchInput" placeholder="Search results…" readonly /></div>
    <button class="filter-btn active" id="fAll">All (20)</button>
    <button class="filter-btn" id="fEmail">Has Email (17)</button>
    <button class="filter-btn" id="fSocial">Has Social (12)</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>#</th>
        <th>Business Name</th>
        <th>Rating</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Website</th>
        <th>Social Media</th>
        <th>Address</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="footer">
  <span>LEAD GEN x AI Powered Tool Pro v2.1 — Viewer</span>
  <span>20 results · restaurants in Dubai</span>
</div>

<div class="toast" id="toast"></div>

<script>
const DATA = [
  {n:'Al Mahara Restaurant',    r:'4.8', e:'info@almahara.ae',         p:'+971-4-301-7600', w:'almahara.ae',        s:'@almahara_ae',          a:'Burj Al Arab, Jumeirah'},
  {n:'Pierchic Dubai',          r:'4.7', e:'reservations@pierchic.ae', p:'+971-4-432-3232', w:'pierchic.ae',        s:'@pierchic',             a:'Al Qasr, Madinat Jumeirah'},
  {n:'Nobu Dubai',              r:'4.6', e:'dubai@nobu.com',           p:'+971-4-318-8811', w:'noburestaurants.com',s:'@nobudubai',            a:'Atlantis, The Palm'},
  {n:'Zuma Dubai',              r:'4.5', e:'info@zumarestaurant.com',  p:'+971-4-425-5660', w:'zumarestaurant.com', s:'@zaboreel',           a:'Gate Village, DIFC'},
  {n:'La Petite Maison',        r:'4.7', e:'dubai@lpmrestaurants.com', p:'+971-4-439-0505', w:'lpmrestaurants.com', s:'@lpmdubai',             a:'Gate Village, DIFC'},
  {n:'CÉ LA VI Dubai',          r:'4.4', e:'dubai@celavi.com',         p:'+971-4-582-6111', w:'celavi.com',         s:'@celavidubai',          a:'Address Sky View Hotel'},
  {n:'Nusr-Et Steakhouse',      r:'4.3', e:'info@nusr-et.com',         p:'+971-4-510-5411', w:'nusr-et.com',        s:'@nuaboreel',             a:'The Address Downtown'},
  {n:'Tresind Studio',          r:'4.9', e:'info@tresindstudio.com',   p:'+971-4-720-1122', w:'tresindstudio.com',  s:'@tresindstudio',        a:'DIFC, Gate Village 3'},
  {n:'Ossiano Restaurant',      r:'4.6', e:'dine@atlantis.com',        p:'+971-4-426-2626', w:'atlantis.com',       s:'@atlantisthepalm',      a:'Atlantis, The Palm'},
  {n:'COYA Dubai',              r:'4.5', e:'reservations@coya.ae',     p:'+971-4-316-9600', w:'coya.ae',            s:'@coyadubai',            a:'Four Seasons, Jumeirah'},
  {n:'BB Social Dining',        r:'4.3', e:'hello@bbsocial.com',       p:'+971-4-396-4446', w:'bbsocialdining.com', s:'@bbsocialdining',       a:'DIFC, Gate Village'},
  {n:'Hakkasan Dubai',          r:'4.4', e:'dubai@hakkasan.com',       p:'+971-4-318-8088', w:'hakkasan.com',       s:'@hakkasan',             a:'Atlantis, The Palm'},
  {n:'Clap Dubai',              r:'4.2', e:'info@clapdubai.com',       p:'+971-4-569-3820', w:'clapdubai.com',      s:'—',                     a:'DIFC, Gate Avenue'},
  {n:'Tasca by José Avillez',   r:'4.6', e:'tasca@jose.ae',            p:'+971-4-275-2500', w:'jose.ae',            s:'@tascadubai',           a:'Mandarin Oriental'},
  {n:'3 Fils Dubai',            r:'4.8', e:'hello@3fils.com',           p:'+971-4-333-4003', w:'3fils.com',          s:'@3fils',                a:'Jumeirah Fishing Harbour'},
  {n:'Orfali Bros Bistro',      r:'4.9', e:'info@orfalibros.com',      p:'+971-4-250-5530', w:'orfalibros.com',     s:'@orfalibros',           a:'Al Wasl Road, Jumeirah'},
  {n:'Arabian Tea House',       r:'4.5', e:'info@arabtea.ae',           p:'+971-4-353-5071', w:'arabianteahouse.ae', s:'@arabianteahouse',      a:'Al Fahidi Historical District'},
  {n:'Ravi Restaurant',         r:'4.2', e:'—',                         p:'+971-4-331-5353', w:'—',                  s:'—',                     a:'Satwa Road, Satwa'},
  {n:'Bu Qtair Fish',           r:'4.6', e:'—',                         p:'+971-4-380-5474', w:'—',                  s:'—',                     a:'Jumeirah Fishing Harbour'},
  {n:'Al Ustad Special Kabab',  r:'4.3', e:'—',                         p:'+971-4-397-3033', w:'—',                  s:'—',                     a:'Al Musallah Road, Bur Dubai'},
];

const tbody = document.getElementById('tbody');
const searchInput = document.getElementById('searchInput');
const toast = document.getElementById('toast');

function renderRows(data, delay) {
  tbody.innerHTML = '';
  data.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.style.animationDelay = (delay ? i * 0.04 : 0) + 's';
    tr.innerHTML = `
      <td style="color:var(--m);font-family:var(--mono);font-size:11px">${i+1}</td>
      <td><span class="cell-name">${r.n}</span></td>
      <td class="cell-rating"><span class="star">★</span> ${r.r}</td>
      <td class="cell-email">${r.e==='—'?'<span class="no">—</span>':'<a>'+r.e+'</a>'}</td>
      <td class="cell-phone">${r.p}</td>
      <td class="cell-web">${r.w==='—'?'<span class="no">—</span>':'<a>'+r.w+'</a>'}</td>
      <td class="cell-social">${r.s==='—'?'<span class="no">—</span>':'<a>'+r.s+'</a>'}</td>
      <td class="cell-addr">${r.a}</td>`;
    tbody.appendChild(tr);
  });
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── ANIMATION TIMELINE ──
renderRows(DATA, true);

// Phase 1: Type in search box (simulating filter)
setTimeout(() => {
  const search = 'Nobu';
  let i = 0;
  const iv = setInterval(() => {
    i++;
    searchInput.value = search.slice(0, i);
    if (i >= search.length) {
      clearInterval(iv);
      // Filter results
      setTimeout(() => {
        const filtered = DATA.filter(r => r.n.toLowerCase().includes('nobu'));
        renderRows(filtered, true);
        document.getElementById('totalStat').textContent = filtered.length;

        // Phase 2: Clear search, show "Has Email" filter
        setTimeout(() => {
          searchInput.value = '';
          renderRows(DATA, true);
          document.getElementById('totalStat').textContent = DATA.length;

          setTimeout(() => {
            // Click "Has Email" filter
            document.getElementById('fAll').classList.remove('active');
            document.getElementById('fEmail').classList.add('active');
            document.getElementById('fEmail').classList.add('flash');
            const withEmail = DATA.filter(r => r.e !== '—');
            renderRows(withEmail, true);
            document.getElementById('totalStat').textContent = withEmail.length;
            document.getElementById('emailStat').textContent = withEmail.length;

            setTimeout(() => {
              // Click "Has Social" filter
              document.getElementById('fEmail').classList.remove('active');
              document.getElementById('fSocial').classList.add('active');
              document.getElementById('fSocial').classList.add('flash');
              const withSocial = DATA.filter(r => r.s !== '—');
              renderRows(withSocial, true);
              document.getElementById('totalStat').textContent = withSocial.length;

              setTimeout(() => {
                // Back to All
                document.getElementById('fSocial').classList.remove('active');
                document.getElementById('fAll').classList.add('active');
                renderRows(DATA, true);
                document.getElementById('totalStat').textContent = DATA.length;

                // Phase 3: Click Download CSV
                setTimeout(() => {
                  document.getElementById('btnDl').style.transform = 'scale(0.95)';
                  setTimeout(() => {
                    document.getElementById('btnDl').style.transform = '';
                    showToast('✓ CSV downloaded — leads_restaurants_in_dubai.csv');

                    // Phase 4: Click Copy All
                    setTimeout(() => {
                      document.getElementById('btnCopy').style.transform = 'scale(0.95)';
                      setTimeout(() => {
                        document.getElementById('btnCopy').style.transform = '';
                        document.getElementById('btnCopy').style.color = 'var(--g)';
                        document.getElementById('btnCopy').style.borderColor = 'var(--gb)';
                        document.getElementById('btnCopy').innerHTML = '✓ Copied!';
                        showToast('✓ 20 rows copied to clipboard');

                        // Reset and loop
                        setTimeout(() => {
                          document.getElementById('btnCopy').innerHTML = '📋 Copy All';
                          document.getElementById('btnCopy').style.color = '';
                          document.getElementById('btnCopy').style.borderColor = '';
                          document.getElementById('emailStat').textContent = '17';

                          setTimeout(runTimeline, 1500);
                        }, 2500);
                      }, 150);
                    }, 2000);
                  }, 150);
                }, 2000);
              }, 2000);
            }, 2000);
          }, 2000);
        }, 1500);
      }, 2000);
    }
  }, 100);
}, 1500);

function runTimeline() {
  renderRows(DATA, true);
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('fAll').classList.add('active');
  document.getElementById('totalStat').textContent = DATA.length;
  searchInput.value = '';

  setTimeout(() => {
    const search = 'Nobu';
    let i = 0;
    const iv = setInterval(() => {
      i++;
      searchInput.value = search.slice(0, i);
      if (i >= search.length) {
        clearInterval(iv);
        setTimeout(() => {
          const filtered = DATA.filter(r => r.n.toLowerCase().includes('nobu'));
          renderRows(filtered, true);
          document.getElementById('totalStat').textContent = filtered.length;

          setTimeout(() => {
            searchInput.value = '';
            renderRows(DATA, true);
            document.getElementById('totalStat').textContent = DATA.length;

            setTimeout(() => {
              document.getElementById('fAll').classList.remove('active');
              document.getElementById('fEmail').classList.add('active');
              const withEmail = DATA.filter(r => r.e !== '—');
              renderRows(withEmail, true);
              document.getElementById('totalStat').textContent = withEmail.length;

              setTimeout(() => {
                document.getElementById('fEmail').classList.remove('active');
                document.getElementById('fSocial').classList.add('active');
                const withSocial = DATA.filter(r => r.s !== '—');
                renderRows(withSocial, true);
                document.getElementById('totalStat').textContent = withSocial.length;

                setTimeout(() => {
                  document.getElementById('fSocial').classList.remove('active');
                  document.getElementById('fAll').classList.add('active');
                  renderRows(DATA, true);
                  document.getElementById('totalStat').textContent = DATA.length;

                  setTimeout(() => {
                    document.getElementById('btnDl').style.transform = 'scale(0.95)';
                    setTimeout(() => {
                      document.getElementById('btnDl').style.transform = '';
                      showToast('✓ CSV downloaded — leads_restaurants_in_dubai.csv');

                      setTimeout(() => {
                        document.getElementById('btnCopy').style.transform = 'scale(0.95)';
                        setTimeout(() => {
                          document.getElementById('btnCopy').style.transform = '';
                          document.getElementById('btnCopy').innerHTML = '✓ Copied!';
                          document.getElementById('btnCopy').style.color = 'var(--g)';
                          document.getElementById('btnCopy').style.borderColor = 'var(--gb)';
                          showToast('✓ 20 rows copied to clipboard');
                          setTimeout(() => {
                            document.getElementById('btnCopy').innerHTML = '📋 Copy All';
                            document.getElementById('btnCopy').style.color = '';
                            document.getElementById('btnCopy').style.borderColor = '';
                            document.getElementById('emailStat').textContent = '17';
                            setTimeout(runTimeline, 1500);
                          }, 2500);
                        }, 150);
                      }, 2000);
                    }, 150);
                  }, 2000);
                }, 2000);
              }, 2000);
            }, 2000);
          }, 1500);
        }, 2000);
      }
    }, 100);
  }, 1500);
}
</script>
</body>
</html>
