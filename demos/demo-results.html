<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo – Results List</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--surf:#111118;--card:#17171f;--card2:#1e1e28;
  --b:rgba(255,255,255,0.07);--bhi:rgba(255,255,255,0.12);
  --g:#22c55e;--gd:rgba(34,197,94,.11);--gb:rgba(34,197,94,.22);
  --amber:#f59e0b;--blue:#60a5fa;--purple:#a78bfa;
  --red:#f87171;
  --t:#d8d8e8;--m:#52526a;
  --mono:'Courier New',monospace;--ui:-apple-system,'Segoe UI',system-ui,sans-serif;
}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#030308}

.phone{width:480px;background:var(--bg);border-radius:16px;box-shadow:0 0 60px rgba(34,197,94,.08),0 0 0 1px rgba(255,255,255,.06);overflow:hidden}

.credit-banner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(135deg,rgba(34,197,94,.07),rgba(34,197,94,.03));border-bottom:1px solid var(--b)}
.credit-left{display:flex;align-items:center;gap:10px}
.credit-icon{width:32px;height:32px;background:var(--gd);border:1px solid rgba(34,197,94,.25);border-radius:8px;display:flex;align-items:center;justify-content:center}
.credit-icon svg{width:18px;height:18px}
.credit-info .credit-label{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.8px;margin-bottom:1px}
.credit-count{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--g);line-height:1}
.credit-sub{font-size:10px;color:var(--m);margin-top:1px}
.btn-topup{padding:6px 14px;background:var(--g);color:#000;border:none;border-radius:6px;font-size:11.5px;font-weight:700;font-family:var(--ui)}

.tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--b)}
.tab{flex:1;padding:11px 6px;font-size:12px;font-weight:600;color:var(--m);text-align:center;border:none;background:transparent;position:relative}
.tab.active{color:var(--g)}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--g);border-radius:2px 2px 0 0}

.panel{padding:14px 16px}
.field-label{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.search-wrap{position:relative;margin-bottom:9px}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.iq{width:100%;background:var(--card2);border:1px solid var(--bhi);border-radius:8px;padding:9px 12px 9px 33px;color:var(--t);font-size:13px;font-family:var(--ui);outline:none}

.opts-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;background:var(--card);border:1px solid var(--b);border-radius:8px;padding:8px 12px}
.ol{font-size:11.5px;color:var(--m)}
.im{width:52px;background:var(--surf);border:1px solid var(--bhi);border-radius:5px;padding:4px 8px;color:var(--t);font-size:12px;font-family:var(--mono);text-align:center;outline:none}
.credit-cost-pill{margin-left:auto;display:flex;align-items:center;gap:5px;background:var(--gd);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--g);font-family:var(--mono)}

.btn-start{width:100%;padding:11px 16px;background:var(--g);color:#000;border:none;border-radius:9px;font-size:13.5px;font-weight:700;font-family:var(--ui);display:flex;align-items:center;justify-content:center;gap:8px}

.divider{height:1px;background:var(--b);margin:12px 0}

/* Progress done */
.prog-sec{margin-bottom:10px}
.status-ln{font-family:var(--mono);font-size:11.5px;color:var(--g);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--g);flex-shrink:0}
.ptrack{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin-bottom:4px}
.pfill{height:100%;background:linear-gradient(90deg,var(--g),#86efac);border-radius:2px;width:100%}
.plbl{display:flex;justify-content:space-between;font-size:10px;color:var(--m);font-family:var(--mono)}

/* Results */
.res-sec{}
.res-tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.res-cnt{font-size:11.5px;color:var(--m)}.res-cnt strong{color:var(--g);font-family:var(--mono);font-size:13px}
.btn-export{padding:5px 12px;background:var(--gd);color:var(--g);border:1px solid rgba(34,197,94,.22);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--ui);display:flex;align-items:center;gap:4px}
.twrap{border:1px solid var(--b);border-radius:8px;overflow:hidden;max-height:210px;overflow-y:auto;scroll-behavior:smooth}
.twrap::-webkit-scrollbar{width:3px}.twrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:11.5px}
thead th{background:var(--surf);padding:6px 10px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--m);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:1}
tbody td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0}
tbody tr:hover td{background:rgba(255,255,255,.02)}
.cn{width:30%}.cr{width:10%}.ce{width:26%}.cw{width:17%}.ch{width:17%}
.nm{color:#ededf6;font-weight:600}.rt{color:var(--amber);font-family:var(--mono);font-weight:700}
.he{color:var(--g);font-family:var(--mono);font-size:10.5px}.ne{color:var(--m)}.hw{color:var(--blue)}
.cp{color:var(--t);font-family:var(--mono);font-size:10.5px}

tbody tr{opacity:0;animation:fadeRow .35s ease forwards}
@keyframes fadeRow{to{opacity:1}}

.ftr{padding:7px 16px 8px;border-top:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;font-size:9.5px;color:#2a2a3d;font-family:var(--mono)}
.fdt{width:3px;height:3px;border-radius:50%;background:rgba(34,197,94,.25);display:inline-block;margin:0 5px}

/* Highlight row */
tbody tr.hl td{background:rgba(34,197,94,.06)}

/* ═══ COMPREHENSIVE RESPONSIVE ═══ */
.phone{width:min(480px,calc(100vw - 24px));margin:12px auto}
@media(max-width:520px){
  body{min-height:auto;padding:8px}
  .phone{width:100%;border-radius:12px}
  .credit-banner{padding:8px 12px}
  .credit-icon{width:28px;height:28px}
  .credit-count{font-size:15px}
  .btn-topup{padding:5px 11px;font-size:10.5px}
  .panel{padding:10px 12px}
  .iq{font-size:12px;padding:8px 10px 8px 30px}
  .opts-row{padding:6px 10px;gap:6px}
  .btn-start{padding:9px 12px;font-size:12.5px}
  .twrap{max-height:180px}
  thead th{padding:5px 7px;font-size:8px}
  tbody td{padding:5px 7px;font-size:10.5px}
  .res-tb{flex-wrap:wrap;gap:6px}
  .btn-export{font-size:10px;padding:4px 10px}
  .ftr{font-size:8.5px;padding:6px 12px}
}
@media(max-width:360px){
  .phone{border-radius:10px}
  .credit-banner{padding:6px 10px;flex-wrap:wrap;gap:6px}
  .tabs{flex-wrap:wrap}
  .tab{font-size:11px;padding:8px 4px}
  thead th{font-size:7.5px;letter-spacing:.4px}
  tbody td{font-size:10px;padding:4px 6px}
}
</style>
</head>
<body>
<div class="phone">
  <div class="credit-banner">
    <div class="credit-left">
      <div class="credit-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/>
          <path d="M7 20.662V19a2 2 0 012-2h6a2 2 0 012 2v1.662"/>
        </svg>
      </div>
      <div class="credit-info">
        <div class="credit-label">Your Credits</div>
        <div class="credit-count">480</div>
        <div class="credit-sub">1 credit = 1 result</div>
      </div>
    </div>
    <button class="btn-topup">+ Buy Credits</button>
  </div>

  <div class="tabs">
    <button class="tab active">🔍 Scrape</button>
    <button class="tab">🛒 Buy Credits</button>
  </div>

  <div class="panel">
    <div class="field-label" style="margin-top:2px">Search Query</div>
    <div class="search-wrap">
      <input type="text" class="iq" value="restaurants in Dubai" readonly />
    </div>
    <div class="opts-row">
      <span class="ol">Max results</span>
      <input type="number" class="im" value="20" readonly />
      <div class="credit-cost-pill"><span>🪙</span><span>20 credits</span></div>
    </div>
    <button class="btn-start">▶ Start Scraping</button>
    <div class="divider"></div>

    <div class="prog-sec">
      <div class="status-ln"><span class="sdot"></span><span>✓ Done — 20 results scraped!</span></div>
      <div class="ptrack"><div class="pfill"></div></div>
      <div class="plbl"><span>100%</span><span>20 / 20</span></div>
      <div class="divider"></div>
    </div>

    <div class="res-sec">
      <div class="res-tb">
        <span class="res-cnt"><strong>20</strong> results</span>
        <button class="btn-export" id="btnExport">↓ Export CSV</button>
      </div>
      <div class="twrap" id="twrap">
        <table>
          <thead><tr><th class="cn">Name</th><th class="cr">Rating</th><th class="ce">Email</th><th class="cw">Website</th><th class="ch">Phone</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="ftr">
    <span>LEAD GEN x AI Powered Tool Pro v2.1</span>
    <span><span class="fdt"></span> Credits: 480</span>
  </div>
</div>

<script>
const DATA = [
  {n:'Al Mahara Restaurant',    r:'4.8', e:'info@almahara.ae',         w:'almahara.ae',        p:'+971-4-301-7600'},
  {n:'Pierchic Dubai',          r:'4.7', e:'reservations@pierchic.ae', w:'pierchic.ae',        p:'+971-4-432-3232'},
  {n:'Nobu Dubai',              r:'4.6', e:'dubai@nobu.com',           w:'noburestaurants.com',p:'+971-4-318-8811'},
  {n:'Zuma Dubai',              r:'4.5', e:'info@zumarestaurant.com',  w:'zumarestaurant.com', p:'+971-4-425-5660'},
  {n:'La Petite Maison',        r:'4.7', e:'dubai@lpmrestaurants.com', w:'lpmrestaurants.com', p:'+971-4-439-0505'},
  {n:'CÉ LA VI Dubai',          r:'4.4', e:'dubai@celavi.com',         w:'celavi.com',         p:'+971-4-582-6111'},
  {n:'Nusr-Et Steakhouse',      r:'4.3', e:'info@nusr-et.com',         w:'nusr-et.com',        p:'+971-4-510-5411'},
  {n:'Tresind Studio',          r:'4.9', e:'info@tresindstudio.com',   w:'tresindstudio.com',  p:'+971-4-720-1122'},
  {n:'Ossiano Restaurant',      r:'4.6', e:'dine@atlantis.com',        w:'atlantis.com',       p:'+971-4-426-2626'},
  {n:'COYA Dubai',              r:'4.5', e:'reservations@coya.ae',     w:'coya.ae',            p:'+971-4-316-9600'},
  {n:'BB Social Dining',        r:'4.3', e:'hello@bbsocial.com',       w:'bbsocialdining.com', p:'+971-4-396-4446'},
  {n:'Hakkasan Dubai',          r:'4.4', e:'dubai@hakkasan.com',       w:'hakkasan.com',       p:'+971-4-318-8088'},
  {n:'Clap Dubai',              r:'4.2', e:'info@clapdubai.com',       w:'clapdubai.com',      p:'+971-4-569-3820'},
  {n:'Tasca by José Avillez',   r:'4.6', e:'tasca@jose.ae',            w:'jose.ae',            p:'+971-4-275-2500'},
  {n:'3 Fils',                  r:'4.8', e:'hello@3fils.com',           w:'3fils.com',          p:'+971-4-333-4003'},
  {n:'Orfali Bros Bistro',      r:'4.9', e:'info@orfalibros.com',      w:'orfalibros.com',     p:'+971-4-250-5530'},
  {n:'Arabian Tea House',       r:'4.5', e:'info@arabtea.ae',           w:'arabianteahouse.ae', p:'+971-4-353-5071'},
  {n:'Ravi Restaurant',         r:'4.2', e:'—',                         w:'—',                  p:'+971-4-331-5353'},
  {n:'Bu Qtair Fish',           r:'4.6', e:'—',                         w:'—',                  p:'+971-4-380-5474'},
  {n:'Al Ustad Special Kabab',  r:'4.3', e:'—',                         w:'—',                  p:'+971-4-397-3033'},
];

const tbody = document.getElementById('tbody');
const twrap = document.getElementById('twrap');

function buildRows() {
  tbody.innerHTML = '';
  DATA.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.style.animationDelay = (i * 0.06) + 's';
    tr.innerHTML = `<td class="cn"><span class="nm">${r.n}</span></td><td class="cr"><span class="rt">★ ${r.r}</span></td><td class="ce">${r.e==='—'?'<span class="ne">—</span>':'<span class="he">'+r.e+'</span>'}</td><td class="cw">${r.w==='—'?'<span class="ne">—</span>':'<span class="hw">'+r.w+'</span>'}</td><td class="ch"><span class="cp">${r.p}</span></td>`;
    tbody.appendChild(tr);
  });
}

// Auto-scroll animation
function autoScroll() {
  let pos = 0;
  const maxScroll = twrap.scrollHeight - twrap.clientHeight;
  const speed = 0.5;
  let dir = 1;
  let hlIndex = -1;

  function step() {
    pos += speed * dir;
    if (pos >= maxScroll) { dir = -1; pos = maxScroll; }
    if (pos <= 0) { dir = 1; pos = 0; }
    twrap.scrollTop = pos;

    // Highlight a random row periodically
    const tick = Math.floor(pos / 20);
    if (tick !== hlIndex) {
      hlIndex = tick;
      tbody.querySelectorAll('tr').forEach(tr => tr.classList.remove('hl'));
      const idx = Math.floor(Math.random() * DATA.length);
      const rows = tbody.querySelectorAll('tr');
      if (rows[idx]) rows[idx].classList.add('hl');
    }

    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

buildRows();
setTimeout(autoScroll, 1500);
</script>
</body>
</html>
